<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Levitating HTML — Demo</title>
  <style>
    :root{
      --bg: #b30000; /* deep red */
      --text: #ffffff;
      --accent: #ffde00; /* for accents if needed */
    }
    html,body{height:100%;margin:0}
    body{
      background-color:var(--bg);
      color:var(--text);
      font-family:system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:2rem;
      line-height:1.4;
      text-align:center;
    }
    main{
      max-width:48rem;
    }
    h1{
      font-size:2.4rem;
      margin:0 0 .5rem;
      letter-spacing:0.02em;
      animation:levitate 3s ease-in-out infinite;
    }
    p{margin:.5rem 0 0}
    @keyframes levitate{
      0%{transform:translateY(0)}
      50%{transform:translateY(-12px)}
      100%{transform:translateY(0)}
    }
    /* Make sure text is readable on small screens */
    @media (max-width:420px){
      h1{font-size:1.6rem}
    }
  </style>
</head>
<body>
  <main role="main" aria-labelledby="title">
    <h1 id="title">Levitating HTML</h1>
    <p>This is a tiny HTML demo using CSS for styling and accessibility-friendly structure.</p>
  </main>
</body>
</html>
